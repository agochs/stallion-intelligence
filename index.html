<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoroughbred Stallion Intelligence Platform</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0f172a; color:#f1f5f9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
        .card { background:#1e293b; border:1px solid #334155; border-radius:0.5rem; transition:border-color 0.2s; }
        .card:hover { border-color:#f59e0b; cursor:pointer; }
        .badge-gold { background:#f59e0b; color:#0f172a; padding:0.15rem 0.6rem; border-radius:9999px; font-size:0.75rem; font-weight:700; }
      .badge-blue { background:#3b82f6; color:#fff; padding:0.15rem 0.6rem; border-radius:9999px; font-size:0.75rem; font-weight:600; }
      .badge-green { background:#10b981; color:#fff; padding:0.15rem 0.6rem; border-radius:9999px; font-size:0.75rem; font-weight:600; }
        .badge-silver { background:#94a3b8; color:#0f172a; padding:0.15rem 0.6rem; border-radius:9999px; font-size:0.75rem; font-weight:700; }
        .badge-emerald { background:#10b981; color:#0f172a; padding:0.15rem 0.6rem; border-radius:9999px; font-size:0.75rem; font-weight:700; }
        .chip { background:#334155; color:#e2e8f0; padding:0.15rem 0.6rem; border-radius:9999px; font-size:0.7rem; display:inline-block; margin:0 0.25rem 0.25rem 0; }
        select,input[type="number"],input[type="text"] { background:#0f172a; color:#f1f5f9; border:1px solid #334155; padding:0.4rem 0.6rem; border-radius:0.375rem; font-size:0.8rem; }
        select:focus,input:focus { border-color:#f59e0b; outline:none; }
        .btn { padding:0.5rem 1rem; border-radius:0.375rem; font-weight:600; cursor:pointer; font-size:0.85rem; border:none; transition:all 0.2s; }
        .btn-gold { background:#f59e0b; color:#0f172a; }
        .btn-gold:hover { background:#d97706; }
        .btn-outline { background:transparent; color:#f1f5f9; border:1px solid #475569; }
        .btn-outline:hover { border-color:#f59e0b; color:#f59e0b; }
        .btn-red { background:#ef4444; color:white; }
        .tab-btn { background:transparent; color:#94a3b8; border:none; padding:0.6rem 1.2rem; cursor:pointer; font-size:0.85rem; font-weight:500; border-bottom:2px solid transparent; transition:all 0.2s; }
        .tab-btn:hover { color:#f1f5f9; }
        .tab-btn.active { color:#f59e0b; border-bottom-color:#f59e0b; font-weight:700; }
        table { width:100%; border-collapse:collapse; font-size:0.85rem; }
        th { text-align:left; padding:0.6rem 0.75rem; color:#94a3b8; font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid #334155; }
        td { padding:0.6rem 0.75rem; border-bottom:1px solid #1e293b; }
        tr:hover td { background:#1e293b; }
        a { color:#38bdf8; text-decoration:none; }
        a:hover { text-decoration:underline; }
        .sort-header { cursor:pointer; user-select:none; white-space:nowrap; }
        .sort-header:hover { color:#f59e0b; }
        .search-input { background:#1e293b; color:#f1f5f9; border:1px solid #334155; padding:0.5rem 0.75rem; border-radius:0.375rem; font-size:0.85rem; width:220px; }
        .search-input:focus { border-color:#f59e0b; outline:none; }
        .view-toggle { display:inline-flex; border:1px solid #334155; border-radius:0.375rem; overflow:hidden; }
        .view-toggle button { background:transparent; color:#94a3b8; border:none; padding:0.4rem 0.8rem; cursor:pointer; font-size:0.8rem; }
        .view-toggle button.active { background:#334155; color:#f1f5f9; }
        .stat-box { background:#1e293b; padding:0.75rem; border-radius:0.375rem; text-align:center; }
        .stat-box .label { color:#64748b; font-size:0.7rem; margin-bottom:0.25rem; }
        .stat-box .value { font-size:1.1rem; font-weight:700; }
    </style>
</head>
<body>
<div id="root"></div>
<script src="db.js"></script><script src="fix.js"></script>
<script type="text/babel">


const {useState,useEffect,useRef,useMemo} = React;

const fmt$ = v => v==null||v===0?'N/A':'$'+Math.floor(v).toLocaleString();
const fmtK = v => v==null||v===0?'N/A':v>=1e6?'$'+(v/1e6).toFixed(1)+'M':'$'+Math.round(v/1000)+'K';
const fmtN = v => v==null?'0':Number(v).toLocaleString();
function getDam(sire){ return sire&&sire.dam_id ? DB.dams[String(sire.dam_id)]||null : null; }

/* ── Pedigree tree builder ── */
function buildTree(nodes){
    if(!nodes||!nodes.length) return null;
    const map={};
    nodes.forEach(n=>{ map[n.tree_path]={name:n.horse_name,gen:n.generation_depth,path:n.tree_path,isBT:!!n.is_black_type_winner,btLevel:n.black_type_level,year:n.year_foaled,country:n.country,children:[]}; });
    const root=map['R']; if(!root) return null;
    ['S','D'].forEach(p=>{ if(map[p]) root.children.push(map[p]); });
    Object.keys(map).sort((a,b)=>a.length-b.length).forEach(path=>{ if(path.length>=2&&path!=='R'){ const parent=path.slice(0,-1); if(map[parent]&&!map[parent].children.find(c=>c.path===path)) map[parent].children.push(map[path]); } });
    return root;
}

/* ── D3 Pedigree Chart ── */
function PedigreeChart({sireId}){
    const svgRef=useRef(null);
    const containerRef=useRef(null);
    const nodes=DB.pedigree_nodes[String(sireId)]||[];
    const tree=buildTree(nodes);

    useEffect(()=>{
        if(!tree||!svgRef.current) return;
        const svg=d3.select(svgRef.current);
        svg.selectAll('*').remove();

        /* ── Measure the tree ── */
        const root=d3.hierarchy(tree, d=>d.children);
        const maxDepth = root.height;          /* deepest generation */
        const leaves = root.leaves().length;   /* number of leaf nodes */

        /* ── Size the canvas generously ── */
        const nodeW = 180;        /* horizontal space per generation */
        const nodeH = 46;         /* vertical space per leaf */
        const padL = 100;         /* left padding for root label */
        const padR = 90;          /* right padding (half boxW + margin) */
        const padTB = 20;

        const w = padL + (maxDepth + 1) * nodeW + padR;
        const h = Math.max(400, leaves * nodeH + padTB * 2);

        svg.attr('width', w).attr('height', h)
           .style('min-width', w + 'px')
           .style('display', 'block');

        /* ── Layout ── */
        const layout = d3.tree().size([h - padTB*2, w - padL - padR]);
        layout(root);

        const g = svg.append('g').attr('transform', `translate(${padL},${padTB})`);

        /* ── Links ── */
        g.selectAll('.link').data(root.links()).join('path')
            .attr('fill','none').attr('stroke','#475569').attr('stroke-width',1.5)
            .attr('d', d3.linkHorizontal().x(d=>d.y).y(d=>d.x));

        /* ── Nodes ── */
        const boxW = 140, boxH = 34;
        const nd = g.selectAll('.node').data(root.descendants()).join('g')
            .attr('transform', d=>`translate(${d.y},${d.x})`);

        nd.append('rect')
            .attr('x', -boxW/2).attr('y', -boxH/2)
            .attr('width', boxW).attr('height', boxH).attr('rx', 6)
            .attr('fill', d => {
                if(d.data.btLevel==='G1') return '#f59e0b';
                if(d.data.btLevel==='G2') return '#a78bfa';
                if(d.data.btLevel==='G3') return '#60a5fa';
                if(d.data.isBT) return '#94a3b8';
                return '#334155';
            })
            .attr('stroke', d => d.data.btLevel==='G1'?'#d97706':d.data.isBT?'#64748b':'#475569')
            .attr('stroke-width', 1.5);

        /* Name text — always legible */
        nd.append('text')
            .attr('text-anchor','middle')
            .attr('dy', d => d.data.year ? '-0.15em' : '0.35em')
            .attr('fill', d => (d.data.btLevel==='G1'||d.data.btLevel==='G2') ? '#0f172a' : d.data.isBT ? '#0f172a' : '#e2e8f0')
            .attr('font-size', '12px')
            .attr('font-weight','600')
            .text(d => d.data.name.length > 18 ? d.data.name.slice(0,16)+'…' : d.data.name);

        /* Year subtitle */
        nd.filter(d=>d.data.year).append('text')
            .attr('text-anchor','middle').attr('dy','1.2em')
            .attr('fill', d => d.data.isBT ? '#0f172a99' : '#94a3b8')
            .attr('font-size','10px')
            .text(d => '(' + d.data.year + ')');

        /* Generation labels at top */
        const genLabels = ['Root','Sire / Dam','Grandsires / Granddams','Great-Grand','4th Gen'];
        for(let i = 0; i <= Math.min(maxDepth, 4); i++){
            const x = root.descendants().filter(d=>d.depth===i)[0]?.y || 0;
            svg.append('text').attr('x', padL + x).attr('y', 14)
                .attr('text-anchor','middle').attr('fill','#64748b')
                .attr('font-size','10px').attr('font-weight','500')
                .text(genLabels[i] || 'Gen '+i);
        }

    },[tree]);

    if(!tree) return <div style={{padding:'2rem',textAlign:'center',color:'#94a3b8'}}><p>No pedigree data available.</p></div>;

    return <div>
        <div ref={containerRef} style={{overflowX:'auto',overflowY:'auto',maxHeight:'700px',border:'1px solid #1e293b',borderRadius:'0.5rem',background:'#0c1222',padding:'0.5rem'}}>
            <svg ref={svgRef}/>
        </div>
        <div style={{display:'flex',gap:'1rem',marginTop:'0.75rem',fontSize:'0.75rem',color:'#94a3b8'}}>
            <span><span style={{display:'inline-block',width:12,height:12,background:'#f59e0b',borderRadius:3,marginRight:4}}/>G1 Winner</span>
            <span><span style={{display:'inline-block',width:12,height:12,background:'#a78bfa',borderRadius:3,marginRight:4}}/>G2</span>
            <span><span style={{display:'inline-block',width:12,height:12,background:'#60a5fa',borderRadius:3,marginRight:4}}/>G3</span>
            <span><span style={{display:'inline-block',width:12,height:12,background:'#94a3b8',borderRadius:3,marginRight:4}}/>Black Type</span>
            <span><span style={{display:'inline-block',width:12,height:12,background:'#334155',borderRadius:3,marginRight:4}}/>Other</span>
        </div>
        <p style={{fontSize:'0.7rem',color:'#475569',marginTop:'0.25rem'}}>Scroll horizontally to see deeper generations →</p>
    </div>;
}

/* ── Fee Chart ── */
function FeeChart({sireId}){
    const svgRef=useRef(null);
    const history=(DB.fee_history[String(sireId)]||[]).sort((a,b)=>a.year-b.year);
    useEffect(()=>{
        if(!history.length||!svgRef.current) return;
        const svg=d3.select(svgRef.current); svg.selectAll('*').remove();
        const w=700,h=300,m={t:30,r:30,b:50,l:80};
        svg.attr('viewBox',`0 0 ${w} ${h}`);
        const x=d3.scaleBand().domain(history.map(d=>d.year)).range([m.l,w-m.r]).padding(0.3);
        const y=d3.scaleLinear().domain([0,d3.max(history,d=>d.fee||0)*1.15||1]).range([h-m.b,m.t]);
        svg.selectAll('.bar').data(history).join('rect').attr('x',d=>x(d.year)).attr('width',x.bandwidth()).attr('y',d=>y(d.fee||0)).attr('height',d=>h-m.b-y(d.fee||0)).attr('fill','#10b981').attr('rx',3);
        svg.selectAll('.label').data(history).join('text').attr('x',d=>x(d.year)+x.bandwidth()/2).attr('y',d=>y(d.fee||0)-6).attr('text-anchor','middle').attr('fill','#e2e8f0').attr('font-size','10px').attr('font-weight','600').text(d=>d.fee?fmtK(d.fee):'Private');
        svg.append('g').attr('transform',`translate(0,${h-m.b})`).call(d3.axisBottom(x).tickSizeOuter(0)).selectAll('text').attr('fill','#94a3b8');
        svg.selectAll('.domain,.tick line').attr('stroke','#475569');
        svg.append('g').attr('transform',`translate(${m.l},0)`).call(d3.axisLeft(y).ticks(5).tickFormat(d=>fmtK(d))).selectAll('text').attr('fill','#94a3b8');
    },[history]);
    if(!history.length) return <p style={{color:'#94a3b8',padding:'1rem'}}>No fee history available.</p>;
    return <div style={{overflowX:'auto'}}><svg ref={svgRef} style={{width:'100%',height:'auto',maxHeight:'300px'}}/></div>;
}

/* ── Dam Quality Bar ── */
function DamQualityBar({label,value,max,color}){
    const pct=max>0?((value||0)/max)*100:0;
    return <div style={{marginBottom:'0.75rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'0.25rem',fontSize:'0.8rem'}}>
            <span style={{color:'#cbd5e1'}}>{label}</span>
            <span style={{color:'#f1f5f9',fontWeight:600}}>{(value||0).toFixed(1)}/{max}</span>
        </div>
        <div style={{background:'#0f172a',borderRadius:4,height:20,overflow:'hidden'}}>
            <div style={{background:color,height:'100%',width:pct+'%',borderRadius:4,transition:'width 0.5s'}}/>
        </div>
    </div>;
}

/* ── Dashboard ── */
function Dashboard({onSelectSire}){
    const [search,setSearch]=useState('');
    const [view,setView]=useState('table');
    const [sortCol,setSortCol]=useState('stud_fee_current');
    const [sortDir,setSortDir]=useState('desc');
    const [statusFilter,setStatusFilter]=useState('');
    const [farmFilter,setFarmFilter]=useState('');
    const [sireTypeFilter,setSireTypeFilter]=useState('');
    const [minFee,setMinFee]=useState('');
    const [maxFee,setMaxFee]=useState('');
   

    const farms=useMemo(()=>{const c={};DB.sires.forEach(s=>{const f=s.stud_farm||'Unknown';c[f]=(c[f]||0)+1;});return Object.entries(c).sort((a,b)=>b[1]-a[1]);},[]);

    const filtered=useMemo(()=>{
        let s=[...DB.sires];s=s.filter(x=>!x.removed);
        if(search){const q=search.toLowerCase();s=s.filter(x=>x.name.toLowerCase().includes(q)||(x.stud_farm||'').toLowerCase().includes(q));}
        if(statusFilter) s=s.filter(x=>x.status===statusFilter);
        if(farmFilter) s=s.filter(x=>x.stud_farm===farmFilter);
        if(sireTypeFilter==='first_crop') s=s.filter(x=>x.first_crop_sire);if(sireTypeFilter==='first_season') s=s.filter(x=>x.first_season_sire);if(sireTypeFilter==='second_crop') s=s.filter(x=>x.second_crop_sire);
        if(minFee) s=s.filter(x=>(x.stud_fee_current||0)>=Number(minFee));
        if(maxFee) s=s.filter(x=>(x.stud_fee_current||0)<=Number(maxFee));s.sort((a,b)=>{
            if(sortCol==='name') return sortDir==='asc'?a.name.localeCompare(b.name):b.name.localeCompare(a.name);
            return sortDir==='desc'?(b[sortCol]||0)-(a[sortCol]||0):(a[sortCol]||0)-(b[sortCol]||0);
        });
        return s;
    },[search,statusFilter,farmFilter,sireTypeFilter,minFee,maxFee,sortCol,sortDir]);

    const toggleSort=c=>{if(sortCol===c)setSortDir(sortDir==='desc'?'asc':'desc');else{setSortCol(c);setSortDir('desc');}};
    const arrow=c=>sortCol===c?(sortDir==='desc'?' \u25BC':' \u25B2'):'';

    return <div style={{maxWidth:1400,margin:'0 auto',padding:'1.5rem'}}>
        <div style={{textAlign:'center',marginBottom:'1.5rem',paddingTop:'0.5rem'}}>
            <h1 style={{fontSize:'1.6rem',fontWeight:800,letterSpacing:'-0.02em'}}>Thoroughbred Stallion Intelligence</h1>
            <p style={{color:'#94a3b8',fontSize:'0.85rem',marginTop:'0.25rem'}}>{DB.sires.filter(x=>!x.removed).length} stallions across {farms.length} farms</p>
        </div>

        {/* Toolbar */}
        <div style={{background:'#1e293b',borderRadius:'0.5rem',padding:'0.75rem 1rem',marginBottom:'1rem',display:'flex',flexWrap:'wrap',gap:'0.75rem',alignItems:'center'}}>
            <input className="search-input" placeholder="Search stallions, farms…" value={search} onChange={e=>setSearch(e.target.value)}/>
            <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option value="">All Status</option><option value="active">Active</option><option value="retired">Retired</option><option value="deceased">Deceased</option><option value="pensioned">Pensioned</option></select>
            <select value={farmFilter} onChange={e=>setFarmFilter(e.target.value)} style={{maxWidth:180}}><option value="">All Farms</option>{farms.map(([f,c])=><option key={f} value={f}>{f} ({c})</option>)}</select>
            <select value={sireTypeFilter} onChange={e=>setSireTypeFilter(e.target.value)}><option value="">All Sires</option><option value="first_crop">First Crop Sires</option><option value="first_season">First Season Sires</option><option value="second_crop">2nd Crop Sires</option></select>
           
            <div style={{display:'flex',gap:'0.3rem',alignItems:'center'}}><span style={{fontSize:'0.7rem',color:'#64748b'}}>Fee:</span><input type="number" style={{width:75}} placeholder="Min" value={minFee} onChange={e=>setMinFee(e.target.value)}/><span style={{color:'#475569'}}>–</span><input type="number" style={{width:75}} placeholder="Max" value={maxFee} onChange={e=>setMaxFee(e.target.value)}/></div>
            <div style={{marginLeft:'auto',display:'flex',gap:'0.5rem',alignItems:'center'}}>
                <span style={{fontSize:'0.8rem',color:'#94a3b8'}}>{filtered.length}</span>
                <div className="view-toggle"><button className={view==='table'?'active':''} onClick={()=>setView('table')}>Table</button><button className={view==='cards'?'active':''} onClick={()=>setView('cards')}>Cards</button></div>
                <button className="btn btn-outline" onClick={()=>window.location.hash='#/watchlist'} style={{padding:'0.35rem 0.7rem',fontSize:'0.8rem'}}>Watchlist</button>
            </div>
        </div>

        {/* TABLE VIEW */}
        {view==='table'&&<div style={{overflowX:'auto',border:'1px solid #1e293b',borderRadius:'0.5rem'}}>
            <table><thead><tr style={{background:'#1e293b'}}>
                <th className="sort-header" onClick={()=>toggleSort('name')}>Stallion{arrow('name')}</th>
                <th className="sort-header" onClick={()=>toggleSort('stud_fee_current')}>Fee{arrow('stud_fee_current')}</th>
                <th>Farm</th>
                <th className="sort-header" onClick={()=>toggleSort('career_earnings')}>Earnings{arrow('career_earnings')}</th>
                <th className="sort-header" onClick={()=>toggleSort('g1_winners')}>G1 Offspr.{arrow('g1_winners')}</th>
                <th className="sort-header" onClick={()=>toggleSort('black_type_winners')}>BT Win{arrow('black_type_winners')}</th>
                <th className="sort-header" onClick={()=>toggleSort('dam_quality_score')}>DQ Score{arrow('dam_quality_score')}</th>
                <th>Status</th>
                <th>Sire</th>
                <th>Dam</th>
            </tr></thead><tbody>
                {filtered.map(s=>{const dam=getDam(s);return <tr key={s.id} style={{cursor:'pointer'}} onClick={()=>onSelectSire(s.id)}>
                    <td style={{fontWeight:700,whiteSpace:'nowrap'}}>{s.name}{s.first_crop_sire?<span className="badge-gold" style={{marginLeft:6,fontSize:'0.6rem'}}>1st Crop</span>:null}{s.first_season_sire?<span className="badge-green" style={{marginLeft:6,fontSize:'0.6rem'}}>1st Season</span>:null}{s.second_crop_sire?<span className="badge-blue" style={{marginLeft:6,fontSize:'0.6rem'}}>2nd Crop</span>:null}</td>
                    <td style={{color:'#10b981',fontWeight:600,whiteSpace:'nowrap'}}>{fmtK(s.stud_fee_current)}</td>
                    <td style={{color:'#94a3b8',fontSize:'0.78rem',maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.stud_farm}</td>
                    <td style={{whiteSpace:'nowrap'}}>{fmtK(s.career_earnings)}</td>
                    <td style={{color:s.g1_winners>5?'#f59e0b':'#f1f5f9',fontWeight:s.g1_winners>5?700:400}}>{s.g1_winners||0}</td>
                    <td>{s.black_type_winners||0}</td>
                    <td>{s.dam_quality_score?<span style={{color:s.dam_quality_score>35?'#10b981':s.dam_quality_score>25?'#f59e0b':'#94a3b8',fontWeight:600}}>{s.dam_quality_score.toFixed(1)}</span>:'—'}</td>
                    <td><span className={s.status==='active'?'badge-emerald':s.status==='deceased'?'badge-silver':'chip'} style={{fontSize:'0.65rem'}}>{s.status}</span></td>
                    <td style={{color:'#94a3b8',fontSize:'0.78rem',whiteSpace:'nowrap'}}>{s.sire_id?DB.sire_names[String(s.sire_id)]||'—':'—'}</td>
                    <td style={{color:'#94a3b8',fontSize:'0.78rem',whiteSpace:'nowrap'}}>{dam?dam.name:'—'}</td>
                </tr>;})}
            </tbody></table>
        </div>}

        {/* CARD VIEW */}
        {view==='cards'&&<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:'0.75rem'}}>
            {filtered.map(s=>{const rr=DB.race_records[String(s.id)];const dam=getDam(s);return <div key={s.id} className="card" style={{padding:'1rem'}} onClick={()=>onSelectSire(s.id)}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'0.5rem'}}><div><h3 style={{fontSize:'1.05rem',fontWeight:700}}>{s.name}</h3><p style={{fontSize:'0.75rem',color:'#94a3b8'}}>{s.year_foaled} • {s.stud_farm}</p></div><div style={{textAlign:'right'}}><div style={{color:'#10b981',fontSize:'1.15rem',fontWeight:700}}>{fmtK(s.stud_fee_current)}</div></div></div>
                <div style={{display:'flex',gap:'0.75rem',fontSize:'0.78rem',color:'#cbd5e1',marginBottom:'0.5rem'}}><span>{s.career_starts||0}-{s.career_wins||0}-{s.career_places||0}-{s.career_shows||0}</span><span style={{color:'#64748b'}}>|</span><span>{fmtK(s.career_earnings)}</span>{rr&&rr.g1_wins>0&&<><span style={{color:'#64748b'}}>|</span><span style={{color:'#f59e0b'}}>{rr.g1_wins} G1</span></>}</div>

        </div>}
    </div>;
}

            <div style={{minWidth:'2rem',textAlign:'center',fontSize:'1.1rem',fontWeight:800,color:'#475569'}}>{i+1}</div>
            <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:'0.5rem',flexWrap:'wrap',marginBottom:'0.2rem'}}>
                    <span style={{fontWeight:700,fontSize:'0.95rem',color:'#f1f5f9'}}>{w.n}</span>
                    {w.g&&w.g!=='\u2014'&&<span style={{background:gradeBg(w.g),color:'#fff',padding:'0.1rem 0.5rem',borderRadius:'9999px',fontSize:'0.65rem',fontWeight:700}}>{w.g}</span>}
                    {w.by&&<span style={{fontSize:'0.75rem',color:'#64748b'}}>by {w.by}</span>}
                </div>
                <div style={{fontSize:'0.8rem',color:'#94a3b8'}}>{w.w}</div>
            </div>
            <div style={{textAlign:'right',minWidth:'5rem'}}>
                {w.e>0&&<div style={{fontWeight:700,color:'#10b981',fontSize:'0.9rem'}}>{fmt$(w.e)}</div>}
                <div style={{fontSize:'0.7rem',color:'#64748b'}}>{w.y}</div>
            </div>
        </div>)}
    </div>
</div>;})()}
</div>}

        {/* FEE HISTORY */}
        {tab==='fees'&&<div>
            <h2 style={{fontSize:'1.2rem',fontWeight:700,marginBottom:'1rem'}}>Stud Fee History</h2>
            <FeeChart sireId={sire.id}/>
            {feeH.length>0?<table style={{marginTop:'1rem'}}><thead><tr><th>Year</th><th>Fee</th></tr></thead><tbody>{feeH.map((f,i)=><tr key={i}><td>{f.year}</td><td style={{color:'#10b981',fontWeight:600}}>{f.fee_label||fmt$(f.fee)}</td></tr>)}</tbody></table>:<p style={{color:'#94a3b8',marginTop:'1rem'}}>No fee history records.</p>}
        </div>}

        {/* SOURCES */}
        {tab==='sources'&&<div>
            <h2 style={{fontSize:'1.2rem',fontWeight:700,marginBottom:'1rem'}}>Data Sources & Provenance</h2>
            <p style={{color:'#94a3b8',fontSize:'0.8rem',marginBottom:'1rem'}}>Every data point is tracked to its source for accuracy auditing.</p>
            {sources.length>0?<table><thead><tr><th>Source</th><th>Fields</th><th>URL</th></tr></thead><tbody>{sources.map((s,i)=><tr key={i}><td style={{fontWeight:600}}>{s.source_name}</td><td style={{color:'#94a3b8'}}>{s.fields_sourced}</td><td>{s.source_url?<a href={s.source_url.startsWith('http')?s.source_url:'https://'+s.source_url} target="_blank" rel="noopener">{(s.source_url||'').slice(0,50)}</a>:'—'}</td></tr>)}</tbody></table>:<p style={{color:'#94a3b8'}}>No source records for this sire.</p>}
        </div>}
    </div>;
}

/* ── Watchlist ── */
function Watchlist({onSelectSire}){
    const [items,setItems]=useState([]);const [note,setNote]=useState('');const [sel,setSel]=useState('');
    const add=()=>{if(!sel)return;setItems([...items,{id:Date.now(),eid:Number(sel),notes:note,name:DB.sires.find(s=>s.id===Number(sel))?.name}]);setNote('');setSel('');};
    return <div style={{maxWidth:800,margin:'0 auto',padding:'1.5rem'}}>
        <button className="btn btn-outline" onClick={()=>window.location.hash='#/'} style={{marginBottom:'1rem'}}>← Dashboard</button>
        <h1 style={{fontSize:'1.5rem',fontWeight:700,marginBottom:'1.5rem'}}>Watchlist</h1>
        <div style={{background:'#1e293b',padding:'1rem',borderRadius:'0.5rem',marginBottom:'1.5rem',display:'flex',gap:'0.75rem',alignItems:'flex-end',flexWrap:'wrap'}}>
            <div><label style={{fontSize:'0.7rem',color:'#64748b',display:'block',marginBottom:2}}>Sire</label><select value={sel} onChange={e=>setSel(e.target.value)} style={{minWidth:200}}><option value="">Select…</option>{[...DB.sires].filter(x=>!x.removed).sort((a,b)=>a.name.localeCompare(b.name)).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
            <div style={{flex:1}}><label style={{fontSize:'0.7rem',color:'#64748b',display:'block',marginBottom:2}}>Notes</label><input type="text" value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. Watch first crop" style={{width:'100%'}}/></div>
            <button className="btn btn-gold" onClick={add}>Add</button>
        </div>
        {items.length===0&&<p style={{color:'#64748b',textAlign:'center',padding:'2rem'}}>No items yet.</p>}
        {items.map(item=><div key={item.id} style={{background:'#1e293b',padding:'1rem',borderRadius:'0.375rem',marginBottom:'0.75rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><span style={{fontWeight:600,color:'#f59e0b',cursor:'pointer'}} onClick={()=>onSelectSire(item.eid)}>{item.name}</span>{item.notes&&<span style={{color:'#94a3b8',marginLeft:'1rem',fontSize:'0.85rem'}}>{item.notes}</span>}</div>
            <button className="btn btn-red" onClick={()=>setItems(items.filter(i=>i.id!==item.id))} style={{padding:'0.3rem 0.6rem',fontSize:'0.75rem'}}>Remove</button>
        </div>)}
    </div>;
}

/* ── App ── */
function App(){
    const [hash,setHash]=useState(window.location.hash||'#/');
    useEffect(()=>{const h=()=>setHash(window.location.hash||'#/');window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h);},[]);
    const goSire=id=>{if(id===null)window.location.hash='#/';else window.location.hash='#/sire/'+id;};
    if(hash.startsWith('#/sire/')){const id=hash.split('/')[2];return <SireDetail sireId={id} onBack={()=>window.location.hash='#/'}/>;}
    if(hash==='#/watchlist') return <Watchlist onSelectSire={goSire}/>;
    return <Dashboard onSelectSire={goSire}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
